aid: american-battle-monuments-commission
name: American Battle Monuments Commission
description: >-
  The American Battle Monuments Commission (ABMC), established by Congress in
  1923, commemorates the service, achievements, and sacrifice of U.S. Armed
  Forces. ABMC administers and maintains 26 American military cemeteries and
  31 memorials, monuments, and markers on foreign soil. The commission maintains
  a searchable database of more than 200,000 fallen service members buried or
  commemorated abroad, accessible via the We Remember burial search portal.
  ABMC is working on a data roadmap to provide open datasets on data.gov per
  the Foundations for Evidence-based Policymaking Act (2019).
